# Run from this directory (m2r2/mock-backend):
#
#   docker compose up -d --build mock-backend
#
# Legacy `docker-compose` (hyphen):
#   docker-compose up --build -d mock-backend
#
# Point mystic-flame `.env` at:
#   NEXT_PUBLIC_API_BASE_URL=http://localhost:8080/api/v1
#   NEXT_PUBLIC_API_BASE=http://localhost:8080
#
# To use another host port, change the left side below (e.g. "18080:8080").

version: "3.3"

services:
  mock-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mystic-flame-mock-backend
    ports:
      - "8080:8080"
    environment:
      MOCK_BACKEND_PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8080/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
